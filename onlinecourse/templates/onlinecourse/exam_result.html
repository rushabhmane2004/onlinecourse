<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Exam Result</title>
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-success">
        <h1>Congratulations!</h1>
        <h3>You have completed the exam for {{ course.name }}</h3>
        <p>Your Score: <strong>{{ grade }}</strong></p>
    </div>
    <h4>Exam Results:</h4>
    <ul class="list-group">
        {% for question in course.question_set.all %}
        <li class="list-group-item">
            <strong>Question: {{ question.content }}</strong><br>
            <span class="text-success">Correct Answer(s) are listed in the system.</span>
        </li>
        {% endfor %}
    </ul>
    <a href="{% url 'onlinecourse:index' %}" class="btn btn-primary mt-3">Back to Courses</a>
</div>
</body>
</html>
